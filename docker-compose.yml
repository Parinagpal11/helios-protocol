version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: helios-db
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios
      POSTGRES_DB: helios
    ports:
      - "5432:5432"
    volumes:
      - helios-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  helios-db-data:
