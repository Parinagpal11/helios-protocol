[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
helios-program = "REPLACE_WITH_YOUR_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
